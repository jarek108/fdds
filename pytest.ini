[pytest]
markers =
    model: Marks tests as model performance tests (often requiring live API access).

filterwarnings =
    # Suppress the Python 3.10 EOL warning from Google
    ignore:You are using a Python version (3.10.11) which Google will stop supporting.*:FutureWarning
    # Suppress the legacy google-generativeai deprecation warning
    ignore:.*support for the .google.generativeai. package has ended.*:FutureWarning
